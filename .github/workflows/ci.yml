name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  game-engine:
    name: game-engine (typecheck + build + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/game-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/game-engine/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  mobile-typecheck:
    name: mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
